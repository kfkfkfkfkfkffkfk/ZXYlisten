<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZXYlisten</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* ── RESET ─────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── ROOT ──────────────────────────────────────── */
:root {
  --glow: #e74c3c;
  --glow2: #ff6b35;
  --glass: rgba(10,10,10,0.55);
  --glass-border: rgba(255,255,255,0.08);
  --text: #f5f0eb;
  --muted: rgba(255,255,255,0.35);
  --red: #e74c3c;
}



/* ── BODY ──────────────────────────────────────── */
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Rajdhani', sans-serif;
  color: var(--text);
  background: #0a0a0a;
}

/* ── BACKGROUND ────────────────────────────────── */
#bg {
  position: fixed; inset: 0; z-index: 0;
  background: linear-gradient(135deg, #0d0000 0%, #1a0a0a 40%, #0a0d1a 100%);
  background-size: cover; background-position: center;
  transition: opacity 0.8s ease;
}
#bg::after {
  content: '';
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.52);
  backdrop-filter: blur(2px);
}

/* Scanlines */
#scanlines {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
  );
  animation: scanMove 8s linear infinite;
}
@keyframes scanMove { from { background-position: 0 0 } to { background-position: 0 100px } }

/* Grain */
#grain {
  position: fixed; inset: 0; z-index: 2; pointer-events: none; opacity: 0.35;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  animation: grainShift 0.5s steps(1) infinite;
}
@keyframes grainShift {
  0%{transform:translate(0,0)} 20%{transform:translate(-2px,1px)}
  40%{transform:translate(2px,-1px)} 60%{transform:translate(-1px,2px)}
  80%{transform:translate(1px,-2px)} 100%{transform:translate(0,0)}
}

/* ── UPLOAD BUTTON ─────────────────────────────── */
#upload-zone {
  position: fixed; top: 20px; right: 20px; z-index: 100;
}
#upload-btn {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  color: var(--muted);
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  padding: 8px 16px;
  backdrop-filter: blur(12px);
  transition: all 0.2s;
  display: flex; align-items: center; gap: 8px;
}
#upload-btn:hover { border-color: var(--glow); color: var(--text); }
#upload-btn svg { width: 14px; height: 14px; }
#bg-file { display: none; }

/* ── LOGO ──────────────────────────────────────── */
#logo {
  position: fixed; top: 20px; left: 28px; z-index: 100;
  font-family: 'Orbitron', monospace;
  font-weight: 900; font-size: 22px; letter-spacing: 4px;
  background: linear-gradient(90deg, var(--glow), var(--glow2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 12px rgba(231,76,60,0.6));
  animation: logoPulse 4s ease-in-out infinite;
}
#logo span { font-size: 11px; display: block; letter-spacing: 6px; opacity: 0.5; margin-top: -4px; font-weight: 400; -webkit-text-fill-color: rgba(255,255,255,0.4); }
@keyframes logoPulse { 0%,100%{filter:drop-shadow(0 0 12px rgba(231,76,60,0.6))} 50%{filter:drop-shadow(0 0 24px rgba(231,76,60,0.9))} }

/* ── MAIN LAYOUT ───────────────────────────────── */
#app {
  position: fixed; inset: 0; z-index: 10;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}

/* ── PLAYER CARD ───────────────────────────────── */
#player-card {
  width: 100%; max-width: 900px;
  display: grid; grid-template-columns: 340px 1fr;
  gap: 0;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(28px);
  box-shadow: 0 0 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06);
  border-radius: 2px;
  overflow: hidden;
  animation: cardIn 0.8s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes cardIn { from { opacity:0; transform:translateY(30px) scale(0.97) } to { opacity:1; transform:none } }

/* ── LEFT PANEL ────────────────────────────────── */
#left-panel {
  display: flex; flex-direction: column;
  padding: 28px 24px;
  border-right: 1px solid var(--glass-border);
  position: relative; overflow: hidden;
}

#left-panel::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(231,76,60,0.06) 0%, transparent 60%);
  pointer-events: none;
}

/* Album info */
.album-meta { margin-bottom: 22px; }
.album-eyebrow { font-size: 9px; letter-spacing: 4px; color: var(--glow); text-transform: uppercase; margin-bottom: 6px; opacity: 0.8; }
.album-title { font-family: 'Orbitron', monospace; font-size: 26px; font-weight: 900; letter-spacing: 3px; line-height: 1; }
.album-artist { font-size: 13px; color: var(--muted); letter-spacing: 2px; margin-top: 6px; }

/* Video */
#yt-wrap {
  width: 100%; aspect-ratio: 16/9;
  border: 1px solid rgba(255,255,255,0.06);
  background: #000;
  position: relative; overflow: hidden;
  flex-shrink: 0;
}
#yt-wrap::after {
  content: '';
  position: absolute; inset: 0;
  box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
  pointer-events: none; z-index: 2;
}
#yt-frame { width: 100%; height: 100%; display: block; position: relative; z-index: 1; }

/* Progress */
.prog-area { margin-top: 14px; }
.prog-bar {
  height: 3px; background: rgba(255,255,255,0.08);
  position: relative; overflow: hidden;
  margin-bottom: 8px;
}
.prog-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--glow), var(--glow2));
  transition: width 0.4s linear;
  box-shadow: 0 0 8px var(--glow);
}
.prog-bar:hover { height: 5px; transition: height 0.15s; }
.time-row { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); letter-spacing: 1px; }

/* Now playing */
.now-playing-info { margin-top: 14px; flex: 1; }
.np-label { font-size: 9px; letter-spacing: 3px; color: var(--glow); text-transform: uppercase; opacity: 0.7; }
.np-title { font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 700; letter-spacing: 1px; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.np-num { font-size: 10px; color: var(--muted); margin-top: 3px; }

/* Waveform visualizer */
#visualizer {
  display: flex; align-items: center; gap: 2px;
  height: 28px; margin-top: 14px;
}
.v-bar {
  flex: 1; background: rgba(231,76,60,0.3);
  border-radius: 1px;
  transition: height 0.1s ease;
}
.v-bar.active { background: linear-gradient(to top, var(--glow), var(--glow2)); box-shadow: 0 0 4px var(--glow); }

/* Controls */
.controls {
  display: flex; align-items: center; gap: 10px; margin-top: 16px;
}
.ctrl {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text); width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; transition: all 0.15s;
  border-radius: 1px; flex-shrink: 0;
}
.ctrl:hover { background: rgba(231,76,60,0.2); border-color: var(--glow); box-shadow: 0 0 12px rgba(231,76,60,0.3); }
.ctrl.play { width: 44px; height: 44px; font-size: 16px; background: rgba(231,76,60,0.15); border-color: rgba(231,76,60,0.4); }
.ctrl.play:hover { background: rgba(231,76,60,0.35); box-shadow: 0 0 20px rgba(231,76,60,0.5); }
.ctrl.active { background: rgba(231,76,60,0.25); border-color: var(--glow); box-shadow: 0 0 10px rgba(231,76,60,0.4); color: var(--glow); }
.ctrl.active:hover { background: rgba(231,76,60,0.35); }

/* ── RIGHT PANEL: TRACKLIST ────────────────────── */
#right-panel { display: flex; flex-direction: column; overflow: hidden; }

.tracklist-header {
  padding: 16px 20px 12px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  flex-shrink: 0;
}
.tl-label { font-size: 9px; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; }
.tl-count { font-size: 9px; color: var(--glow); letter-spacing: 2px; }

#track-list {
  flex: 1; overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(231,76,60,0.3) transparent;
}
#track-list::-webkit-scrollbar { width: 3px; }
#track-list::-webkit-scrollbar-track { background: transparent; }
#track-list::-webkit-scrollbar-thumb { background: rgba(231,76,60,0.3); }

.track {
  display: grid; grid-template-columns: 32px 1fr 16px;
  align-items: center; gap: 10px;
  padding: 11px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  transition: background 0.15s;
  position: relative; overflow: hidden;
}
.track::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 0;
  background: linear-gradient(90deg, rgba(231,76,60,0.15), transparent);
  transition: width 0.3s ease;
}
.track:hover::before { width: 100%; }
.track:hover { background: rgba(255,255,255,0.02); }
.track.active { background: rgba(231,76,60,0.07); }
.track.active::before { width: 100%; }
.track.active .t-name { color: var(--text); }

.t-num-wrap { display: flex; align-items: center; justify-content: center; }
.t-num-txt { font-size: 11px; color: rgba(255,255,255,0.2); font-family: 'Orbitron', monospace; }
.track.active .t-num-txt { display: none; }
.mini-bars { display: none; gap: 2px; align-items: flex-end; height: 14px; }
.track.active .mini-bars { display: flex; }
.m-bar { width: 3px; background: var(--glow); border-radius: 1px;
  animation: mBounce 0.5s ease-in-out infinite alternate; }
.m-bar:nth-child(2) { animation-delay: 0.15s; }
.m-bar:nth-child(3) { animation-delay: 0.3s; }
@keyframes mBounce { from { height: 3px } to { height: 13px } }

.t-info { min-width: 0; }
.t-name { font-size: 12px; font-weight: 600; letter-spacing: 0.5px; color: rgba(255,255,255,0.7); transition: color 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track:hover .t-name { color: var(--text); }
.t-dur { font-size: 9px; color: rgba(255,255,255,0.2); letter-spacing: 1px; margin-top: 2px; }

.t-arrow { font-size: 10px; color: rgba(255,255,255,0.1); transition: color 0.15s; }
.track:hover .t-arrow, .track.active .t-arrow { color: var(--glow); }

/* ── RESPONSIVE ────────────────────────────────── */
@media (max-width: 680px) {
  #player-card { grid-template-columns: 1fr; max-height: 90vh; overflow-y: auto; }
  #left-panel { border-right: none; border-bottom: 1px solid var(--glass-border); }
  #right-panel { max-height: 300px; }
}
</style>
</head>
<body>

<div id="bg"></div>
<div id="scanlines"></div>
<div id="grain"></div>

<!-- Logo -->
<div id="logo">ZXY<span>listen</span></div>

<!-- Upload BG -->
<div id="upload-zone">
  <button id="upload-btn" onclick="document.getElementById('bg-file').click()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
      <polyline points="21 15 16 10 5 21"/>
    </svg>
    Set Background
  </button>
  <input type="file" id="bg-file" accept="image/*">
</div>

<!-- Main App -->
<div id="app">
  <div id="player-card">

    <!-- Left: Video + Controls -->
    <div id="left-panel">
      <div class="album-meta">
        <div class="album-eyebrow">Now Streaming</div>
        <div class="album-title">BLURRYFACE</div>
        <div class="album-artist">Twenty One Pilots · 2015</div>
      </div>

      <div id="yt-wrap">
        <div id="yt-frame"></div>
      </div>

      <div class="prog-area">
        <div class="prog-bar" id="prog-bar">
          <div class="prog-fill" id="prog-fill"></div>
        </div>
        <div class="time-row">
          <span id="t-cur">0:00</span>
          <span id="t-dur">—</span>
        </div>
      </div>

      <div class="now-playing-info">
        <div class="np-label">Playing</div>
        <div class="np-title" id="np-title">Select a track</div>
        <div class="np-num" id="np-num">—</div>
      </div>

      <div id="visualizer"></div>

      <div class="controls">
        <button class="ctrl" id="shuffle-btn" onclick="toggleShuffle()" title="Shuffle">
          <!-- shuffle icon -->
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
        </button>
        <button class="ctrl" onclick="prevTrack()" title="Prev">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button class="ctrl play" id="pp-btn" onclick="togglePause()">
          <svg id="play-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="pause-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="ctrl" onclick="nextTrack()" title="Next">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg>
        </button>
        <button class="ctrl" id="loop-btn" onclick="toggleLoop()" title="Loop">
          <!-- loop icon -->
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
        </button>
      </div>
    </div>

    <!-- Right: Tracklist -->
    <div id="right-panel">
      <div class="tracklist-header">
        <span class="tl-label">Tracklist</span>
        <span class="tl-count">12 TRACKS</span>
      </div>
      <div id="track-list"></div>
    </div>

  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
// ── Tracks ──────────────────────────────────────────────────────────────
const TRACKS = [
  { n:1,  title:"Heavydirtysoul",                 id:"r1GznCH_OdQ", dur:"3:55" },
  { n:2,  title:"Stressed Out",                   id:"pXRviuL6vMY", dur:"3:22" },
  { n:3,  title:"Ride",                           id:"Pw-4knockKs",  dur:"3:34" },
  { n:4,  title:"Friend, Please",                 id:"MIQ4oHrweyY", dur:"2:48" },
  { n:5,  title:"Message Man",                    id:"BhAMXPJC2cA", dur:"4:01" },
  { n:6,  title:"Polarize",                       id:"VeHMBiHdekk", dur:"3:44" },
  { n:7,  title:"We Don't Believe What's on TV",  id:"nSMTMJJSnrI", dur:"3:11" },
  { n:8,  title:"Lane Boy",                       id:"svS4Qsl5KOY", dur:"4:14" },
  { n:9,  title:"The Judge",                      id:"peHXAyeOaRg", dur:"4:59" },
  { n:10, title:"Doubt",                          id:"MEiVnNNpblk", dur:"2:53" },
  { n:11, title:"Goner",                          id:"0SDEcSNMTLU", dur:"4:15" },
  { n:12, title:"Not Today",                      id:"F9-P4_mMhyI", dur:"4:07" },
];

let player=null, ytReady=false, current=0, progTimer=null, vizTimer=null;
let looping=false, shuffling=false;
let shuffleQueue=[], shufflePos=0;

function buildShuffleQueue() {
  // Fisher-Yates shuffle of indices
  shuffleQueue = TRACKS.map((_,i)=>i);
  for(let i=shuffleQueue.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [shuffleQueue[i],shuffleQueue[j]]=[shuffleQueue[j],shuffleQueue[i]];
  }
  // Put current track first so it doesn't restart
  const ci = shuffleQueue.indexOf(current);
  if(ci>-1){ shuffleQueue.splice(ci,1); shuffleQueue.unshift(current); }
  shufflePos=0;
}

function toggleLoop() {
  looping = !looping;
  document.getElementById('loop-btn').classList.toggle('active', looping);
}

function toggleShuffle() {
  shuffling = !shuffling;
  document.getElementById('shuffle-btn').classList.toggle('active', shuffling);
  if(shuffling) buildShuffleQueue();
}


// ── Background upload ────────────────────────────────────────────────────
document.getElementById('bg-file').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  const bg = document.getElementById('bg');
  bg.style.backgroundImage = `url(${url})`;
  bg.style.backgroundSize = 'cover';
  bg.style.backgroundPosition = 'center';
  document.getElementById('upload-btn').style.borderColor = 'rgba(231,76,60,0.5)';
  document.getElementById('upload-btn').style.color = 'rgba(231,76,60,0.8)';
});

// ── Progress bar click ────────────────────────────────────────────────────
document.getElementById('prog-bar').addEventListener('click', function(e) {
  if (!player || typeof player.getDuration !== 'function') return;
  const r = this.getBoundingClientRect();
  player.seekTo((e.clientX - r.left) / r.width * player.getDuration(), true);
});

// ── Visualizer ───────────────────────────────────────────────────────────
const vizEl = document.getElementById('visualizer');
const BAR_COUNT = 28;
for (let i=0; i<BAR_COUNT; i++) {
  const b = document.createElement('div');
  b.className = 'v-bar';
  b.style.height = '4px';
  vizEl.appendChild(b);
}
const vBars = vizEl.querySelectorAll('.v-bar');

function animateViz(playing) {
  clearInterval(vizTimer);
  if (playing) {
    vBars.forEach(b => b.classList.add('active'));
    vizTimer = setInterval(() => {
      vBars.forEach(b => {
        const h = Math.random() * 22 + 3;
        b.style.height = h + 'px';
      });
    }, 120);
  } else {
    vBars.forEach(b => { b.classList.remove('active'); b.style.height = '4px'; });
  }
}

// ── Build tracklist ──────────────────────────────────────────────────────
function buildList() {
  document.getElementById('track-list').innerHTML = TRACKS.map((t,i) => `
    <div class="track" id="tr${i}" onclick="play(${i})">
      <div class="t-num-wrap">
        <span class="t-num-txt">${String(t.n).padStart(2,'0')}</span>
        <div class="mini-bars"><div class="m-bar"></div><div class="m-bar"></div><div class="m-bar"></div></div>
      </div>
      <div class="t-info">
        <div class="t-name">${t.title}</div>
        <div class="t-dur">${t.dur}</div>
      </div>
      <div class="t-arrow">›</div>
    </div>
  `).join('');
}

// ── YouTube ──────────────────────────────────────────────────────────────
window.onYouTubeIframeAPIReady = function() {
  ytReady = true;
  player = new YT.Player('yt-frame', {
    height:'100%', width:'100%',
    videoId: TRACKS[0].id,
    playerVars: { autoplay:0, rel:0, modestbranding:1, iv_load_policy:3 },
    events: { onStateChange: onState }
  });
};

function fmtTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s/60);
  const ss = String(Math.floor(s%60)).padStart(2,'0');
  return `${m}:${ss}`;
}

function onState(e) {
  const YTS = YT.PlayerState;
  if (e.data === YTS.PLAYING) {
    document.getElementById('play-icon').style.display = 'none';
    document.getElementById('pause-icon').style.display = 'block';
    animateViz(true);
    clearInterval(progTimer);
    progTimer = setInterval(() => {
      if (!player || typeof player.getCurrentTime !== 'function') return;
      const c = player.getCurrentTime(), d = player.getDuration();
      if (d > 0) document.getElementById('prog-fill').style.width = (c/d*100)+'%';
      document.getElementById('t-cur').textContent = fmtTime(c);
      document.getElementById('t-dur').textContent = fmtTime(d);
    }, 500);
  } else {
    document.getElementById('play-icon').style.display = 'block';
    document.getElementById('pause-icon').style.display = 'none';
    if (e.data !== YTS.BUFFERING) animateViz(false);
    if (e.data !== YTS.BUFFERING) clearInterval(progTimer);
  }
  if (e.data === YTS.ENDED) nextTrack();
}

function play(i) {
  if (!ytReady || !player) return;
  current = i;
  // Sync shuffle queue position if shuffling
  if(shuffling) {
    const qi = shuffleQueue.indexOf(i);
    if(qi>-1) shufflePos=qi;
  }
  player.loadVideoById(TRACKS[i].id);
  player.playVideo();
  document.getElementById('np-title').textContent = TRACKS[i].title;
  document.getElementById('np-num').textContent = `Track ${TRACKS[i].n} of ${TRACKS.length}`;
  document.getElementById('prog-fill').style.width = '0%';
  document.getElementById('t-cur').textContent = '0:00';
  document.getElementById('t-dur').textContent = TRACKS[i].dur;
  document.querySelectorAll('.track').forEach((el,j) => el.classList.toggle('active', j===i));
  // Scroll into view
  const el = document.getElementById('tr'+i);
  if (el) el.scrollIntoView({ block:'nearest', behavior:'smooth' });
}

function nextTrack() {
  if(looping) { player.seekTo(0,true); player.playVideo(); return; }
  if(shuffling) {
    shufflePos = (shufflePos+1) % shuffleQueue.length;
    play(shuffleQueue[shufflePos]);
  } else {
    play((current+1)%TRACKS.length);
  }
}
function prevTrack() {
  if(shuffling) {
    shufflePos = (shufflePos-1+shuffleQueue.length) % shuffleQueue.length;
    play(shuffleQueue[shufflePos]);
  } else {
    play((current-1+TRACKS.length)%TRACKS.length);
  }
}
function togglePause() {
  if (!player) return;
  player.getPlayerState() === YT.PlayerState.PLAYING ? player.pauseVideo() : player.playVideo();
}

buildList();
</script>
</body>
