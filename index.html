<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZXYlisten</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
/* ─── RESET ───────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Inter',system-ui,sans-serif;color:#fff}

/* ─── BACKGROUND ──────────────────────────────────────────────────── */
#bg{
  position:fixed;inset:0;z-index:0;
  background:linear-gradient(160deg,#0a0010 0%,#000 45%,#080010 100%);
  background-size:cover;background-position:center;
  transition:background-image 0.6s ease;
}
#bg-blur{
  position:fixed;inset:0;z-index:1;
  background:inherit;
  filter:blur(60px) saturate(1.4);
  opacity:0.7;
  transform:scale(1.1);
}
#bg-overlay{
  position:fixed;inset:0;z-index:2;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0.2) 0%,
    rgba(0,0,0,0.1) 30%,
    rgba(0,0,0,0.55) 70%,
    rgba(0,0,0,0.92) 100%
  );
}

/* ─── AURORA GLOW ──────────────────────────────────────────────────── */
#aurora{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 50% at 20% 40%, rgba(120,40,220,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 80% 60%, rgba(200,60,80,0.14) 0%, transparent 70%),
    radial-gradient(ellipse 70% 60% at 50% 90%, rgba(40,80,180,0.12) 0%, transparent 70%);
  animation:auroraShift 12s ease-in-out infinite alternate;
}
@keyframes auroraShift{
  0%{opacity:1;transform:scale(1) rotate(0deg)}
  100%{opacity:0.7;transform:scale(1.05) rotate(1deg)}
}

/* ─── HEADER BAR ───────────────────────────────────────────────────── */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 32px;
  background:linear-gradient(to bottom,rgba(0,0,0,0.6),transparent);
}

/* ── LOGO: signal stack symbol ── */
#logo{
  font-size:17px;font-weight:700;letter-spacing:3px;
  color:#fff;font-family:'Orbitron',monospace;
  display:flex;align-items:center;gap:10px;
}
#logo .logo-icon{
  width:38px;height:34px;
  position:relative;flex-shrink:0;
  display:flex;align-items:flex-end;justify-content:center;gap:3px;
}
/* 5 bars of different heights — like an equalizer/signal icon */
#logo .logo-icon .lb{
  width:4px;border-radius:2px 2px 1px 1px;
  background:#fff;
  position:relative;
}
#logo .logo-icon .lb:nth-child(1){height:8px}
#logo .logo-icon .lb:nth-child(2){height:16px}
#logo .logo-icon .lb:nth-child(3){height:26px}
#logo .logo-icon .lb:nth-child(4){height:16px}
#logo .logo-icon .lb:nth-child(5){height:8px}
/* Red chromatic ghost — offset left */
#logo .logo-icon .lb::before{
  content:'';position:absolute;inset:0;
  background:rgba(255,0,80,0.6);
  transform:translateX(-3px) translateY(-1px);
  border-radius:inherit;
  mix-blend-mode:screen;
}
/* Cyan chromatic ghost — offset right */
#logo .logo-icon .lb::after{
  content:'';position:absolute;inset:0;
  background:rgba(0,220,255,0.6);
  transform:translateX(3px) translateY(1px);
  border-radius:inherit;
  mix-blend-mode:screen;
}
/* Middle bar pulses with purple glow */
#logo .logo-icon .lb:nth-child(3){
  background:#fff;
  box-shadow:0 0 10px rgba(191,90,242,1), 0 0 22px rgba(191,90,242,0.6), 0 0 40px rgba(191,90,242,0.3);
  animation:barPulse 2s ease-in-out infinite;
}
@keyframes barPulse{
  0%,100%{box-shadow:0 0 10px rgba(191,90,242,1),0 0 22px rgba(191,90,242,0.6),0 0 40px rgba(191,90,242,0.3)}
  50%{box-shadow:0 0 16px rgba(255,55,95,1),0 0 30px rgba(255,55,95,0.6),0 0 50px rgba(255,55,95,0.2)}
}
/* Outer bars also animated */
#logo .logo-icon .lb:nth-child(1),
#logo .logo-icon .lb:nth-child(5){animation:barFade 2s ease-in-out infinite; opacity:0.5}
#logo .logo-icon .lb:nth-child(2),
#logo .logo-icon .lb:nth-child(4){animation:barFade 2s ease-in-out infinite 0.3s; opacity:0.75}
@keyframes barFade{0%,100%{opacity:0.5}50%{opacity:1}}
#logo .logo-text{
  position:relative;
  display:inline-block;
}
/* Chromatic aberration on logo text */
#logo .logo-text::before{
  content:'ZXY';
  position:absolute;left:-2px;top:0;
  color:rgba(255,0,80,0.7);
  mix-blend-mode:screen;
  pointer-events:none;
}
#logo .logo-text::after{
  content:'ZXY';
  position:absolute;left:2px;top:0;
  color:rgba(0,200,255,0.7);
  mix-blend-mode:screen;
  pointer-events:none;
}
#logo .logo-sub{font-size:10px;font-weight:400;color:rgba(255,255,255,0.35);margin-left:0;letter-spacing:4px;font-family:'Inter',sans-serif}

#upload-btn{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.15);
  color:rgba(255,255,255,0.8);
  font-family:'Inter',sans-serif;
  font-size:12px;font-weight:500;
  padding:7px 16px;border-radius:20px;
  cursor:pointer;
  transition:all 0.2s;
  display:flex;align-items:center;gap:6px;
}
#upload-btn:hover{background:rgba(255,255,255,0.18);color:#fff;border-color:rgba(255,255,255,0.3)}
#upload-btn svg{width:13px;height:13px}
#bg-file{display:none}

/* ─── MAIN LAYOUT ──────────────────────────────────────────────────── */
#app{
  position:fixed;inset:0;z-index:10;
  display:flex;align-items:flex-end;
  padding:0 0 0 0;
}

/* ─── TOP SYMBOL ───────────────────────────────────────────────────── */
#top-symbol{
  margin-bottom:20px;
  display:inline-block;
}
#top-symbol img{
  width:72px;height:72px;
  border-radius:50%;
  display:block;
  filter:drop-shadow(0 0 10px rgba(220,50,50,0.8)) drop-shadow(0 0 24px rgba(220,50,50,0.4));
  animation:symbolPulse 4s ease-in-out infinite;
}
@keyframes symbolPulse{
  0%,100%{
    filter:drop-shadow(0 0 10px rgba(220,50,50,0.8)) drop-shadow(0 0 24px rgba(220,50,50,0.4));
    transform:scale(1);
  }
  50%{
    filter:drop-shadow(0 0 18px rgba(255,60,60,1)) drop-shadow(0 0 40px rgba(220,50,50,0.7));
    transform:scale(1.05);
  }
}


#hero{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:0 40px 32px 40px;
  min-width:0;
}

/* Now playing word animations */
#floating-word{
  font-size:clamp(26px, 3vw, 44px);
  font-weight:900;
  letter-spacing:5px;
  line-height:1;
  color:#fff;
  margin-bottom:24px;
  min-height:1.1em;
  display:flex;
  align-items:center;
  overflow:hidden;
  font-family:'Orbitron',monospace;
  text-transform:uppercase;
  filter:drop-shadow(0 0 16px rgba(191,90,242,0.5));
}
/* Chromatic aberration layers on the word */
.word{
  display:inline-block;
  position:relative;
  animation:wordSlideIn 0.5s cubic-bezier(0.16,1,0.3,1) both;
}
.word::before{
  content:attr(data-text);
  position:absolute;left:-3px;top:1px;
  color:rgba(255,0,80,0.55);
  mix-blend-mode:screen;
  pointer-events:none;
  letter-spacing:5px;
}
.word::after{
  content:attr(data-text);
  position:absolute;left:3px;top:-1px;
  color:rgba(0,220,255,0.55);
  mix-blend-mode:screen;
  pointer-events:none;
  letter-spacing:5px;
}
/* Occasional glitch flicker */
@keyframes glitchFlick{
  0%,92%,100%{clip-path:none;transform:none}
  93%{clip-path:inset(20% 0 50% 0);transform:translate(-4px,0)}
  95%{clip-path:inset(60% 0 10% 0);transform:translate(4px,0)}
  97%{clip-path:inset(40% 0 30% 0);transform:translate(-2px,0)}
  99%{clip-path:none;transform:none}
}
.word{animation:wordSlideIn 0.5s cubic-bezier(0.16,1,0.3,1) both, glitchFlick 6s steps(1) infinite}
#floating-word .word{
  display:inline-block;
  animation:wordSlideIn 0.5s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes wordSlideIn{
  from{opacity:0;transform:translateY(40px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes wordSlideOut{
  from{opacity:1;transform:translateY(0)}
  to{opacity:0;transform:translateY(-40px)}
}

.word-exit{animation:wordSlideOut 0.3s cubic-bezier(0.4,0,1,1) both!important}

/* Track meta */
#track-meta{
  display:flex;align-items:center;gap:16px;
  margin-bottom:28px;
}
#track-name-big{
  font-size:22px;font-weight:600;letter-spacing:-0.5px;color:#fff;
}
#track-artist-big{font-size:15px;font-weight:400;color:rgba(255,255,255,0.55)}
.meta-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.3)}

/* Progress bar */
#prog-wrap{
  display:flex;align-items:center;gap:12px;margin-bottom:24px;
}
#prog-bar{
  flex:1;height:4px;border-radius:2px;
  background:rgba(255,255,255,0.15);
  cursor:pointer;position:relative;
  transition:height 0.15s;
}
#prog-bar:hover{height:6px}
#prog-fill{
  height:100%;border-radius:inherit;width:0%;
  background:#fff;
  transition:width 0.4s linear;
}
#prog-bar:hover #prog-fill{background:#fff}
.time-label{font-size:11px;font-weight:500;color:rgba(255,255,255,0.4);min-width:32px;letter-spacing:0.2px}
#t-cur{text-align:right}

/* Controls */
#controls{
  display:flex;align-items:center;gap:0;
  margin-bottom:8px;
}
.ctrl{
  background:none;border:none;color:rgba(255,255,255,0.75);
  width:48px;height:48px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border-radius:50%;
  transition:all 0.15s;
  flex-shrink:0;
}
.ctrl:hover{color:#fff;background:rgba(255,255,255,0.08)}
.ctrl.play-btn{
  width:56px;height:56px;
  background:#fff;
  color:#000;
  border-radius:50%;
  margin:0 6px;
  transition:transform 0.1s, background 0.15s;
}
.ctrl.play-btn:hover{transform:scale(1.06);background:rgba(255,255,255,0.92)}
.ctrl.play-btn:active{transform:scale(0.96)}
.ctrl.on{color:#bf5af2}
.ctrl.on:hover{color:#d47bff}
.ctrl svg{display:block}

/* Visualizer mini */
#mini-viz{
  display:flex;align-items:center;gap:3px;height:20px;margin-left:16px;
  opacity:0;transition:opacity 0.3s;
}
#mini-viz.active{opacity:1}
.mv-bar{
  width:3px;border-radius:2px;height:4px;
  background:rgba(255,255,255,0.5);
}
.mv-bar.a{background:#fff}

/* ─── TRACKLIST PANEL ──────────────────────────────────────────────── */
#panel{
  width:340px;
  height:100%;
  display:flex;flex-direction:column;
  background:rgba(0,0,0,0.45);
  backdrop-filter:blur(40px) saturate(1.2);
  border-left:1px solid rgba(255,255,255,0.07);
  flex-shrink:0;
}

#panel-head{
  padding:80px 20px 16px 20px;
  border-bottom:1px solid rgba(255,255,255,0.06);
  flex-shrink:0;
}
.panel-eyebrow{font-size:11px;font-weight:600;color:rgba(255,255,255,0.35);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:4px}
.panel-title{font-size:20px;font-weight:700;letter-spacing:-0.5px}
.panel-sub{font-size:12px;color:rgba(255,255,255,0.4);margin-top:2px;font-weight:400}

#track-list{flex:1;overflow-y:auto;padding:8px 0}
#track-list::-webkit-scrollbar{width:0px}

.track{
  display:flex;align-items:center;gap:12px;
  padding:10px 20px;cursor:pointer;
  border-radius:0;
  transition:background 0.12s;
  position:relative;
}
.track:hover{background:rgba(255,255,255,0.07)}
.track.active{background:rgba(255,255,255,0.1)}

.t-num-wrap{
  width:22px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.t-num-txt{font-size:13px;font-weight:500;color:rgba(255,255,255,0.25)}
.track.active .t-num-txt{display:none}
.mini-bars{display:none;gap:2px;align-items:flex-end;height:14px}
.track.active .mini-bars{display:flex}
.m-bar{width:2.5px;border-radius:1px;background:#fff;animation:mBounce .5s ease-in-out infinite alternate}
.m-bar:nth-child(2){animation-delay:.15s}
.m-bar:nth-child(3){animation-delay:.3s}
@keyframes mBounce{from{height:3px}to{height:13px}}

.t-info{flex:1;min-width:0}
.t-name{
  font-size:13px;font-weight:500;
  color:rgba(255,255,255,0.7);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:color 0.12s;
}
.track:hover .t-name,.track.active .t-name{color:#fff}
.t-dur{font-size:11px;color:rgba(255,255,255,0.25);margin-top:2px}

.t-right{flex-shrink:0;display:flex;align-items:center;gap:6px}
.t-dot{
  width:5px;height:5px;border-radius:50%;
  background:rgba(255,255,255,0.1);
  transition:background 0.2s;
}
.track.active .t-dot{background:#fff;box-shadow:0 0 6px rgba(255,255,255,0.6)}

/* ─── ALBUM ART THUMB ──────────────────────────────────────────────── */
#art-thumb{
  width:52px;height:52px;border-radius:8px;
  background:linear-gradient(135deg,#2d0040,#500010,#001030);
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:700;letter-spacing:1px;
  color:rgba(255,255,255,0.3);
  box-shadow:0 8px 24px rgba(0,0,0,0.5);
  position:relative;overflow:hidden;
}
#art-thumb::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(191,90,242,0.2),rgba(255,55,95,0.15));
}
#art-vinyl-sm{
  width:38px;height:38px;border-radius:50%;
  background:radial-gradient(circle,#111 0%,#111 18%,#1a0015 19%,#080008 35%,#160010 36%,#060004 52%,#120008 53%,#030001 100%);
  position:absolute;
  box-shadow:inset 0 0 10px rgba(0,0,0,0.8);
}
#art-vinyl-sm.spinning{animation:spin 3s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* ─── BOTTOM NOW PLAYING in panel ─────────────────────────────────── */
#panel-np{
  padding:14px 20px;
  border-top:1px solid rgba(255,255,255,0.06);
  display:flex;align-items:center;gap:12px;
  flex-shrink:0;
}
#panel-np-info{flex:1;min-width:0}
#panel-np-title{font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#panel-np-sub{font-size:11px;color:rgba(255,255,255,0.35);margin-top:1px}

@media(max-width:720px){
  #app{flex-direction:column-reverse}
  #hero{padding:0 20px 24px}
  #floating-word{font-size:clamp(36px,11vw,64px)}
  #panel{width:100%;height:260px;border-left:none;border-top:1px solid rgba(255,255,255,0.07)}
  #panel-head{padding:16px 16px 12px}
}
</style>
</head>

let player=null,ytReady=false,current=0,progTimer=null,vizTimer=null,wordTimer=null;
let looping=false,shuffling=false,shuffleQueue=[],shufflePos=0;
let wordIdx=0,isPlaying=false;

/* ── Mini visualizer ─────────────────────────────────────────────────── */
const mvEl=document.getElementById('mini-viz');
for(let i=0;i<12;i++){const b=document.createElement('div');b.className='mv-bar';b.style.height='4px';mvEl.appendChild(b);}
const mvBars=mvEl.querySelectorAll('.mv-bar');
function animateViz(on){
  clearInterval(vizTimer);
  if(on){
    mvEl.classList.add('active');
    mvBars.forEach(b=>b.classList.add('a'));
    vizTimer=setInterval(()=>{mvBars.forEach(b=>{b.style.height=(Math.random()*14+3)+'px';});},100);
  } else {
    mvEl.classList.remove('active');
    mvBars.forEach(b=>{b.classList.remove('a');b.style.height='4px';});
  }
}

/* ── Animated word display ───────────────────────────────────────────── */
function setWord(text){
  const el=document.getElementById('word-el');
  el.classList.add('word-exit');
  setTimeout(()=>{
    el.textContent=text;
    el.setAttribute('data-text',text);
    el.classList.remove('word-exit');
    el.style.animation='none';
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{el.style.animation='';});
    });
  },280);
}
function startWordCycle(trackTitle){
  clearInterval(wordTimer);
  const words=[trackTitle.toUpperCase(),...WORDS.filter(w=>w!==trackTitle.toUpperCase())];
  let i=0;
  setWord(words[i]);
  wordTimer=setInterval(()=>{i=(i+1)%words.length;setWord(words[i]);},3000);
}
function stopWordCycle(){
  clearInterval(wordTimer);
  setWord('BLURRYFACE');
}

/* ── Background upload ───────────────────────────────────────────────── */
document.getElementById('bg-file').addEventListener('change',function(e){
  const file=e.target.files[0];if(!file)return;
  const url=URL.createObjectURL(file);
  document.getElementById('bg').style.backgroundImage=`url(${url})`;
  document.getElementById('bg').style.backgroundSize='cover';
  document.getElementById('bg').style.backgroundPosition='center';
  document.getElementById('bg-blur').style.backgroundImage=`url(${url})`;
  document.getElementById('upload-btn').style.background='rgba(191,90,242,0.2)';
  document.getElementById('upload-btn').style.borderColor='rgba(191,90,242,0.4)';
  document.getElementById('upload-btn').style.color='#d47bff';
});

/* ── Seekbar ─────────────────────────────────────────────────────────── */
document.getElementById('prog-bar').addEventListener('click',function(e){
  if(!player||typeof player.getDuration!=='function')return;
  const r=this.getBoundingClientRect();
  player.seekTo((e.clientX-r.left)/r.width*player.getDuration(),true);
});

/* ── Build tracklist ─────────────────────────────────────────────────── */
function buildList(){
  document.getElementById('track-list').innerHTML=TRACKS.map((t,i)=>`
    <div class="track" id="tr${i}" onclick="play(${i})">
      <div class="t-num-wrap">
        <span class="t-num-txt">${t.n}</span>
        <div class="mini-bars"><div class="m-bar"></div><div class="m-bar"></div><div class="m-bar"></div></div>
      </div>
      <div class="t-info">
        <div class="t-name">${t.title}</div>
        <div class="t-dur">${t.dur}</div>
      </div>
      <div class="t-right"><div class="t-dot"></div></div>
    </div>
  `).join('');
}

/* ── YouTube ─────────────────────────────────────────────────────────── */
window.onYouTubeIframeAPIReady=function(){
  ytReady=true;
  player=new YT.Player('yt-frame',{
    height:'1',width:'1',
    videoId:TRACKS[0].id,
    playerVars:{autoplay:0,rel:0,modestbranding:1,iv_load_policy:3,controls:0},
    events:{onStateChange:onState,onError:onErr}
  });
};

function fmtTime(s){
  if(!s||isNaN(s))return'0:00';
  return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');
}

function setPlayState(playing){
  isPlaying=playing;
  document.getElementById('play-icon').style.display=playing?'none':'block';
  document.getElementById('pause-icon').style.display=playing?'block':'none';
  const v=document.getElementById('art-vinyl-sm');
  playing?v.classList.add('spinning'):v.classList.remove('spinning');
  animateViz(playing);
  if(playing) startWordCycle(TRACKS[current].title);
  else stopWordCycle();
}

function onState(e){
  const S=YT.PlayerState;
  if(e.data===S.PLAYING){
    setPlayState(true);
    clearInterval(progTimer);
    progTimer=setInterval(()=>{
      if(!player||typeof player.getCurrentTime!=='function')return;
      const c=player.getCurrentTime(),d=player.getDuration();
      if(d>0)document.getElementById('prog-fill').style.width=(c/d*100)+'%';
      document.getElementById('t-cur').textContent=fmtTime(c);
      document.getElementById('t-dur').textContent=fmtTime(d);
    },400);
  } else if(e.data===S.PAUSED){
    setPlayState(false);clearInterval(progTimer);
  } else if(e.data===S.ENDED){
    setPlayState(false);clearInterval(progTimer);nextTrack();
  } else if(e.data!==S.BUFFERING){
    setPlayState(false);clearInterval(progTimer);
  }
}
function onErr(){setTimeout(()=>nextTrack(),1000);}

/* ── Play ────────────────────────────────────────────────────────────── */
function play(i){
  if(!ytReady||!player||typeof player.loadVideoById!=='function')return;
  current=i;
  if(shuffling){const qi=shuffleQueue.indexOf(i);if(qi>-1)shufflePos=qi;}
  player.loadVideoById(TRACKS[i].id);
  document.getElementById('track-name-big').textContent=TRACKS[i].title;
  document.getElementById('track-artist-big').textContent='Twenty One Pilots';
  document.getElementById('t-dur').textContent=TRACKS[i].dur;
  document.getElementById('t-cur').textContent='0:00';
  document.getElementById('prog-fill').style.width='0%';
  document.getElementById('panel-np-title').textContent=TRACKS[i].title;
  document.getElementById('panel-np-sub').textContent='Track '+TRACKS[i].n+' · Blurryface';
  document.querySelectorAll('.track').forEach((el,j)=>el.classList.toggle('active',j===i));
  const el=document.getElementById('tr'+i);
  if(el)el.scrollIntoView({block:'nearest',behavior:'smooth'});
}

function nextTrack(){
  if(looping){player.seekTo(0,true);player.playVideo();return;}
  if(shuffling){shufflePos=(shufflePos+1)%shuffleQueue.length;play(shuffleQueue[shufflePos]);}
  else play((current+1)%TRACKS.length);
}
function prevTrack(){
  if(shuffling){shufflePos=(shufflePos-1+shuffleQueue.length)%shuffleQueue.length;play(shuffleQueue[shufflePos]);}
  else play((current-1+TRACKS.length)%TRACKS.length);
}
function togglePause(){
  if(!player||typeof player.getPlayerState!=='function')return;
  player.getPlayerState()===YT.PlayerState.PLAYING?player.pauseVideo():player.playVideo();
}
function toggleLoop(){
  looping=!looping;
  const b=document.getElementById('loop-btn');
  b.classList.toggle('on',looping);
  b.style.color=looping?'#bf5af2':'';
}
function toggleShuffle(){
  shuffling=!shuffling;
  const b=document.getElementById('shuffle-btn');
  b.classList.toggle('on',shuffling);
  b.style.color=shuffling?'#bf5af2':'';
  if(shuffling){
    shuffleQueue=TRACKS.map((_,i)=>i);
    for(let i=shuffleQueue.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[shuffleQueue[i],shuffleQueue[j]]=[shuffleQueue[j],shuffleQueue[i]];}
    const ci=shuffleQueue.indexOf(current);
    if(ci>-1){shuffleQueue.splice(ci,1);shuffleQueue.unshift(current);}
    shufflePos=0;
  }
}

buildList();
</script>
</body>
</html>
