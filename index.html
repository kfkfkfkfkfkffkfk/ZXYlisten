<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZXYlisten</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Inter',system-ui,sans-serif;color:#fff}
#bg{position:fixed;inset:0;z-index:0;background:linear-gradient(160deg,#0a0010 0%,#000 45%,#080010 100%);background-size:cover;background-position:center;transition:background-image 0.6s ease}
#bg-blur{position:fixed;inset:0;z-index:1;background:inherit;filter:blur(60px) saturate(1.4);opacity:0.7;transform:scale(1.1)}
#bg-overlay{position:fixed;inset:0;z-index:2;background:linear-gradient(to bottom,rgba(0,0,0,0.2) 0%,rgba(0,0,0,0.1) 30%,rgba(0,0,0,0.55) 70%,rgba(0,0,0,0.92) 100%)}
#aurora{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse 80% 50% at 20% 40%,rgba(120,40,220,0.18) 0%,transparent 70%),radial-gradient(ellipse 60% 40% at 80% 60%,rgba(200,60,80,0.14) 0%,transparent 70%),radial-gradient(ellipse 70% 60% at 50% 90%,rgba(40,80,180,0.12) 0%,transparent 70%);animation:auroraShift 12s ease-in-out infinite alternate}
@keyframes auroraShift{0%{opacity:1;transform:scale(1)}100%{opacity:0.7;transform:scale(1.05)}}

/* TOPBAR */
#topbar{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:linear-gradient(to bottom,rgba(0,0,0,0.75),transparent);gap:14px}
#logo{font-size:15px;font-weight:700;letter-spacing:3px;color:#fff;font-family:'Orbitron',monospace;display:flex;align-items:center;gap:8px;flex-shrink:0}
#logo .logo-icon{width:34px;height:30px;display:flex;align-items:flex-end;justify-content:center;gap:3px}
#logo .logo-icon .lb{width:4px;border-radius:2px 2px 1px 1px;background:#fff;position:relative}
#logo .logo-icon .lb:nth-child(1){height:8px}
#logo .logo-icon .lb:nth-child(2){height:16px}
#logo .logo-icon .lb:nth-child(3){height:24px;box-shadow:0 0 10px rgba(191,90,242,1);animation:barPulse 2s ease-in-out infinite}
#logo .logo-icon .lb:nth-child(4){height:16px}
#logo .logo-icon .lb:nth-child(5){height:8px}
#logo .logo-icon .lb::before{content:'';position:absolute;inset:0;background:rgba(255,0,80,0.6);transform:translateX(-3px) translateY(-1px);border-radius:inherit;mix-blend-mode:screen}
#logo .logo-icon .lb::after{content:'';position:absolute;inset:0;background:rgba(0,220,255,0.6);transform:translateX(3px) translateY(1px);border-radius:inherit;mix-blend-mode:screen}
#logo .logo-icon .lb:nth-child(1),#logo .logo-icon .lb:nth-child(5){animation:barFade 2s ease-in-out infinite;opacity:0.5}
#logo .logo-icon .lb:nth-child(2),#logo .logo-icon .lb:nth-child(4){animation:barFade 2s ease-in-out infinite 0.3s;opacity:0.75}
@keyframes barPulse{0%,100%{box-shadow:0 0 10px rgba(191,90,242,1)}50%{box-shadow:0 0 16px rgba(255,55,95,1)}}
@keyframes barFade{0%,100%{opacity:0.5}50%{opacity:1}}
.logo-text{position:relative;display:inline-block}
.logo-text::before{content:'ZXY';position:absolute;left:-2px;top:0;color:rgba(255,0,80,0.7);mix-blend-mode:screen;pointer-events:none}
.logo-text::after{content:'ZXY';position:absolute;left:2px;top:0;color:rgba(0,200,255,0.7);mix-blend-mode:screen;pointer-events:none}
.logo-sub{font-size:9px;font-weight:400;color:rgba(255,255,255,0.35);letter-spacing:4px;font-family:'Inter',sans-serif}

/* SEARCH */
#search-wrap{flex:1;max-width:400px;position:relative}
#search-input{width:100%;background:rgba(255,255,255,0.1);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.15);border-radius:22px;color:#fff;font-family:'Inter',sans-serif;font-size:13px;padding:7px 14px 7px 36px;outline:none;transition:all 0.35s cubic-bezier(0.16,1,0.3,1);cursor:pointer}
#search-input::placeholder{color:rgba(255,255,255,0.4)}
#search-input:focus{background:rgba(0,0,0,0.8);border-color:rgba(255,255,255,0.35);cursor:text}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);pointer-events:none;color:rgba(255,255,255,0.4);width:14px;height:14px}
#search-dropdown{display:none;position:absolute;top:calc(100% + 8px);left:0;right:0;background:rgba(8,8,14,0.98);backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,0.12);border-radius:14px;overflow:hidden;z-index:400;max-height:320px;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.9)}
#search-dropdown.open{display:block}
#search-dropdown::-webkit-scrollbar{width:3px}
#search-dropdown::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:2px}
.sd-header{padding:9px 14px 5px;font-size:10px;font-weight:600;color:rgba(255,255,255,0.3);letter-spacing:0.8px;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,0.06)}
.sd-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;transition:background 0.12s}
.sd-item:hover{background:rgba(255,255,255,0.07)}
.sd-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.2);flex-shrink:0}
.sd-item-text{flex:1;min-width:0}
.sd-title{font-size:12px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sd-sub{font-size:10px;color:rgba(255,255,255,0.35);margin-top:1px}
.sd-play-icon{opacity:0;transition:opacity 0.12s;color:rgba(255,255,255,0.4);flex-shrink:0}
.sd-item:hover .sd-play-icon{opacity:1}
#search-no-results{padding:16px;font-size:12px;color:rgba(255,255,255,0.3);text-align:center}
#search-overlay{display:none;position:fixed;inset:0;z-index:190;background:rgba(0,0,0,0.3)}
#search-overlay.open{display:block}

/* TOPBAR RIGHT */
#topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tb-btn{background:rgba(255,255,255,0.09);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.13);color:rgba(255,255,255,0.75);font-family:'Inter',sans-serif;font-size:11px;font-weight:500;padding:6px 12px;border-radius:18px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.tb-btn:hover{background:rgba(255,255,255,0.16);color:#fff}
.tb-btn svg{width:12px;height:12px;flex-shrink:0}
#bg-file{display:none}

/* HISTORY PANEL */
#hist-overlay{display:none;position:fixed;inset:0;z-index:290;background:rgba(0,0,0,0.35)}
#hist-overlay.open{display:block}
#history-panel{position:fixed;left:0;top:0;bottom:0;width:290px;z-index:300;background:rgba(5,5,12,0.98);backdrop-filter:blur(40px);border-right:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;transform:translateX(-100%);transition:transform 0.35s cubic-bezier(0.16,1,0.3,1);box-shadow:12px 0 40px rgba(0,0,0,0.6)}
#history-panel.open{transform:translateX(0)}
#hist-panel-head{padding:20px 18px 12px;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;display:flex;align-items:flex-start;justify-content:space-between}
.hist-title{font-size:14px;font-weight:700;color:#fff}
.hist-subtitle{font-size:10px;color:rgba(255,255,255,0.35);margin-top:2px}
#hist-close{background:none;border:none;color:rgba(255,255,255,0.4);cursor:pointer;padding:3px;border-radius:50%;transition:all 0.15s;display:flex}
#hist-close:hover{color:#fff;background:rgba(255,255,255,0.1)}
#hist-clear{background:none;border:none;color:rgba(255,255,255,0.22);font-size:10px;font-family:'Inter',sans-serif;cursor:pointer;padding:3px 7px;border-radius:7px;transition:all 0.15s}
#hist-clear:hover{color:rgba(255,100,100,0.8)}
#hist-list{flex:1;overflow-y:auto;padding:4px 0}
#hist-list::-webkit-scrollbar{width:3px}
#hist-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
.hist-item{display:flex;align-items:center;gap:10px;padding:8px 18px;cursor:pointer;transition:background 0.12s}
.hist-item:hover{background:rgba(255,255,255,0.06)}
.hist-num{font-size:10px;color:rgba(255,255,255,0.2);min-width:18px;text-align:right;flex-shrink:0}
.hist-info{flex:1;min-width:0}
.hist-name{font-size:11px;font-weight:500;color:rgba(255,255,255,0.75);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-artist{font-size:10px;color:rgba(255,255,255,0.3);margin-top:1px}
.hist-play-ic{opacity:0;transition:opacity 0.12s;color:rgba(255,255,255,0.4);flex-shrink:0}
.hist-item:hover .hist-play-ic{opacity:1}
#hist-empty{padding:28px 18px;text-align:center;font-size:11px;color:rgba(255,255,255,0.25);line-height:1.6}

/* MAIN LAYOUT */
#app{position:fixed;inset:0;z-index:10;display:flex;align-items:flex-end}
#top-symbol{margin-bottom:16px;display:inline-block}
#top-symbol img{width:64px;height:64px;border-radius:50%;display:block;animation:symbolPulse 4s ease-in-out infinite}
@keyframes symbolPulse{0%,100%{filter:drop-shadow(0 0 10px rgba(220,50,50,0.8)) drop-shadow(0 0 24px rgba(220,50,50,0.4));transform:scale(1)}50%{filter:drop-shadow(0 0 18px rgba(255,60,60,1)) drop-shadow(0 0 40px rgba(220,50,50,0.7));transform:scale(1.05)}}
#hero{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:0 36px 28px;min-width:0}
#floating-word{font-size:clamp(24px,2.8vw,42px);font-weight:900;letter-spacing:5px;line-height:1;color:#fff;margin-bottom:22px;min-height:1.1em;display:flex;align-items:center;overflow:hidden;font-family:'Orbitron',monospace;text-transform:uppercase;filter:drop-shadow(0 0 16px rgba(191,90,242,0.5))}
.word{display:inline-block;position:relative;animation:wordSlideIn 0.5s cubic-bezier(0.16,1,0.3,1) both,glitchFlick 6s steps(1) infinite}
.word::before{content:attr(data-text);position:absolute;left:-3px;top:1px;color:rgba(255,0,80,0.55);mix-blend-mode:screen;pointer-events:none;letter-spacing:5px}
.word::after{content:attr(data-text);position:absolute;left:3px;top:-1px;color:rgba(0,220,255,0.55);mix-blend-mode:screen;pointer-events:none;letter-spacing:5px}
@keyframes glitchFlick{0%,92%,100%{clip-path:none;transform:none}93%{clip-path:inset(20% 0 50% 0);transform:translate(-4px,0)}95%{clip-path:inset(60% 0 10% 0);transform:translate(4px,0)}97%{clip-path:inset(40% 0 30% 0);transform:translate(-2px,0)}99%{clip-path:none;transform:none}}
@keyframes wordSlideIn{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes wordSlideOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-40px)}}
.word-exit{animation:wordSlideOut 0.3s cubic-bezier(0.4,0,1,1) both!important}
#track-meta{display:flex;align-items:center;gap:14px;margin-bottom:24px}
#track-name-big{font-size:20px;font-weight:600;letter-spacing:-0.5px;color:#fff}
#track-artist-big{font-size:14px;font-weight:400;color:rgba(255,255,255,0.55)}
.meta-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.3)}
#prog-wrap{display:flex;align-items:center;gap:12px;margin-bottom:22px}
#prog-bar{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);cursor:pointer;transition:height 0.15s}
#prog-bar:hover{height:6px}
#prog-fill{height:100%;border-radius:inherit;width:0%;background:#fff;transition:width 0.4s linear}
.time-label{font-size:10px;font-weight:500;color:rgba(255,255,255,0.4);min-width:30px;letter-spacing:0.2px}
#t-cur{text-align:right}
#controls{display:flex;align-items:center;gap:0;margin-bottom:6px}
.ctrl{background:none;border:none;color:rgba(255,255,255,0.75);width:46px;height:46px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:50%;transition:all 0.15s;flex-shrink:0}
.ctrl:hover{color:#fff;background:rgba(255,255,255,0.08)}
.ctrl.play-btn{width:54px;height:54px;background:#fff;color:#000;border-radius:50%;margin:0 5px;transition:transform 0.1s,background 0.15s}
.ctrl.play-btn:hover{transform:scale(1.06);background:rgba(255,255,255,0.92)}
.ctrl.play-btn:active{transform:scale(0.96)}
.ctrl.on{color:#bf5af2}
.ctrl svg{display:block}
#mini-viz{display:flex;align-items:center;gap:3px;height:18px;margin-left:14px;opacity:0;transition:opacity 0.3s}
#mini-viz.active{opacity:1}
.mv-bar{width:3px;border-radius:2px;height:4px;background:rgba(255,255,255,0.5)}
.mv-bar.a{background:#fff}

/* PANEL */
#panel{width:330px;height:100%;display:flex;flex-direction:column;background:rgba(0,0,0,0.45);backdrop-filter:blur(40px) saturate(1.2);border-left:1px solid rgba(255,255,255,0.07);flex-shrink:0}
#panel-head{padding:72px 18px 12px;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0}
.panel-eyebrow{font-size:10px;font-weight:600;color:rgba(255,255,255,0.35);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:3px}
.panel-title{font-size:17px;font-weight:700;letter-spacing:-0.5px}
.panel-sub{font-size:11px;color:rgba(255,255,255,0.4);margin-top:1px}

/* Playlist tabs */
#playlist-tabs{display:flex;gap:4px;margin-top:10px;flex-wrap:wrap}
.ptab{flex:1;min-width:calc(50% - 2px);background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:7px;padding:6px 7px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px;overflow:hidden}
.ptab:hover{background:rgba(255,255,255,0.09)}
.ptab.active{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.2)}
.ptab-img{width:20px;height:20px;border-radius:50%;flex-shrink:0;object-fit:cover}
.ptab-label{font-size:9px;font-weight:600;color:rgba(255,255,255,0.55);letter-spacing:0.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ptab.active .ptab-label{color:#fff}

#track-list{flex:1;overflow-y:auto;padding:6px 0}
#track-list::-webkit-scrollbar{width:0px}
.track{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;transition:background 0.12s}
.track:hover{background:rgba(255,255,255,0.07)}
.track.active{background:rgba(255,255,255,0.1)}
.t-num-wrap{width:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.t-num-txt{font-size:12px;font-weight:500;color:rgba(255,255,255,0.25)}
.track.active .t-num-txt{display:none}
.mini-bars{display:none;gap:2px;align-items:flex-end;height:13px}
.track.active .mini-bars{display:flex}
.m-bar{width:2.5px;border-radius:1px;background:#fff;animation:mBounce .5s ease-in-out infinite alternate}
.m-bar:nth-child(2){animation-delay:.15s}
.m-bar:nth-child(3){animation-delay:.3s}
@keyframes mBounce{from{height:3px}to{height:12px}}
.t-info{flex:1;min-width:0}
.t-name{font-size:12px;font-weight:500;color:rgba(255,255,255,0.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color 0.12s}
.track:hover .t-name,.track.active .t-name{color:#fff}
.t-dur{font-size:10px;color:rgba(255,255,255,0.25);margin-top:1px}
.t-right{flex-shrink:0}
.t-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.1)}
.track.active .t-dot{background:#fff;box-shadow:0 0 6px rgba(255,255,255,0.6)}
#art-thumb{width:48px;height:48px;border-radius:7px;background:linear-gradient(135deg,#2d0040,#500010,#001030);flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(0,0,0,0.5);position:relative;overflow:hidden}
#art-thumb::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(191,90,242,0.2),rgba(255,55,95,0.15))}
#art-vinyl-sm{width:36px;height:36px;border-radius:50%;background:radial-gradient(circle,#111 0%,#111 18%,#1a0015 19%,#080008 35%,#160010 36%,#060004 52%,#120008 53%,#030001 100%);position:absolute;box-shadow:inset 0 0 10px rgba(0,0,0,0.8)}
#art-vinyl-sm.spinning{animation:spin 3s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
#panel-np{padding:12px 18px;border-top:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:10px;flex-shrink:0}
#panel-np-info{flex:1;min-width:0}
#panel-np-title{font-size:11px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#panel-np-sub{font-size:10px;color:rgba(255,255,255,0.35);margin-top:1px}

@media(max-width:720px){
  #app{flex-direction:column-reverse}
  #hero{padding:0 18px 22px}
  #panel{width:100%;height:240px;border-left:none;border-top:1px solid rgba(255,255,255,0.07)}
  #panel-head{padding:14px 14px 10px}
  #search-wrap{max-width:160px}
  #logo .logo-sub{display:none}
}
</style>
</head>
<body>
<div id="bg"></div>
<div id="bg-blur"></div>
<div id="aurora"></div>
<div id="bg-overlay"></div>
<div id="yt-frame" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none"></div>

<div id="hist-overlay" onclick="closeHistory()"></div>
<div id="history-panel">
  <div id="hist-panel-head">
    <div>
      <div class="hist-title">Play History</div>
      <div class="hist-subtitle" id="hist-count">0 of 150 recent plays</div>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <button id="hist-clear" onclick="clearHistory()">Clear all</button>
      <button id="hist-close" onclick="closeHistory()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>
  <div id="hist-list"><div id="hist-empty">No history yet.<br>Start playing tracks!</div></div>
</div>

<!-- SEARCH MODAL -->
<div id="search-modal" onclick="onModalBgClick(event)">
  <div id="search-modal-backdrop"></div>
  <div id="search-modal-box">
    <div id="search-modal-inner">
      <div id="search-input-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="Search songs, artists, albums..." autocomplete="off"
          oninput="onSearchInput(this.value)" onkeydown="onSearchKey(event)">
        <span id="search-esc-badge" onclick="closeSearch()">ESC</span>
      </div>
      <div id="search-dropdown">
        <div class="sd-header" id="sd-header-text">Recent Searches</div>
        <div id="sd-results"></div>
        <div id="search-no-results" style="display:none">No results</div>
      </div>
    </div>
  </div>
</div>

<div id="topbar">
  <div id="logo">
    <div class="logo-icon"><div class="lb"></div><div class="lb"></div><div class="lb"></div><div class="lb"></div><div class="lb"></div></div>
    <span class="logo-text">ZXY</span>
    <span class="logo-sub">listen</span>
  </div>
  <div id="search-pill" onclick="openSearch()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <span id="search-pill-text">Search songs, artists, albums...</span>
  </div>
  <div id="topbar-right">
    <button class="tb-btn" onclick="toggleHistory()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="12 8 12 12 14 14"/><path d="M3.05 11a9 9 0 1 0 .5-4"/><polyline points="3 3 3 7 7 7"/></svg>
      History
    </button>
    <button class="tb-btn" onclick="document.getElementById('bg-file').click()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      BG
    </button>
    <input type="file" id="bg-file" accept="image/*">
  </div>
</div>

<div id="app">

      {n:15,title:'Younger',                         id:'anLxLPzgIG4', dur:'3:42'},
      {n:16,title:'I Wish',                          id:'NzImKCeQnX0', dur:'3:30'},  // One Day lyric
      {n:17,title:'Continual ft. Cory Henry',        id:'K0x-P5xmBHs', dur:'4:55'},  // Symphony visualizer
      {n:18,title:"They Don't Know You Like I Do",   id:'wnz2eZ4fffM', dur:'3:40'},  // In Your Corner lyric
      {n:19,title:'Enemy ft. JID',                   id:'D9G1VOjN_84', dur:'3:22'},
    ]
  }
];

let currentPlaylist = 0;
let current = 0;
let isPlaying = false;
let looping = false;
let shuffling = false;
let shuffleQueue = [];
let shufflePos = 0;
let progTimer = null;
let wordTimer = null;
let playHistory = [];
let searchHistory = [];

function TRACKS(){ return PLAYLISTS[currentPlaylist].tracks; }

// ── HISTORY ───────────────────────────────────────────────────────────
function addToHistory(t, pl, plistIdx, trackIdx){
  const e={title:t.title,artist:pl.artist,playlist:pl.name,trackIdx,plistIdx,ts:Date.now()};
  if(playHistory.length&&playHistory[0].title===t.title&&playHistory[0].plistIdx===plistIdx){playHistory.shift();}
  playHistory.unshift(e);
  if(playHistory.length>150)playHistory=playHistory.slice(0,150);
  renderHistory();
}
function renderHistory(){
  const list=document.getElementById('hist-list');
  document.getElementById('hist-count').textContent=playHistory.length+' of 150 recent plays';
  if(!playHistory.length){list.innerHTML='<div id="hist-empty">No history yet.<br>Start playing tracks!</div>';return;}
  list.innerHTML=playHistory.map((h,i)=>`
    <div class="hist-item" onclick="playFromHistory(${i})">
      <span class="hist-num">${i+1}</span>
      <div class="hist-info">
        <div class="hist-name">${h.title}</div>
        <div class="hist-artist">${h.artist} · ${h.playlist}</div>
      </div>
      <svg class="hist-play-ic" width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    </div>`).join('');
}
function playFromHistory(i){
  const h=playHistory[i];if(!h)return;
  if(currentPlaylist!==h.plistIdx){currentPlaylist=h.plistIdx;buildList();updatePanelHead();updateTabs();updateLogo();}
  play(h.trackIdx);closeHistory();
}
function clearHistory(){playHistory=[];renderHistory();}
function toggleHistory(){document.getElementById('history-panel').classList.toggle('open');document.getElementById('hist-overlay').classList.toggle('open');}
function closeHistory(){document.getElementById('history-panel').classList.remove('open');document.getElementById('hist-overlay').classList.remove('open');}

// ── SEARCH MODAL ──────────────────────────────────────────────────────
let searchFocusIdx = -1;
function openSearch(){
  const modal = document.getElementById('search-modal');
  modal.classList.add('open');
  renderSearchDropdown('');
  setTimeout(()=>{ document.getElementById('search-input').focus(); },50);
}
function closeSearch(){
  document.getElementById('search-modal').classList.remove('open');
  document.getElementById('search-input').blur();
  document.getElementById('search-input').value='';
  searchFocusIdx=-1;
}
function onModalBgClick(e){
  if(e.target===document.getElementById('search-modal')||e.target===document.getElementById('search-modal-backdrop'))closeSearch();
}
function onSearchInput(val){searchFocusIdx=-1;renderSearchDropdown(val.trim());}
function onSearchKey(e){
  const items = document.querySelectorAll('#sd-results .sd-item');
  if(e.key==='Escape'){closeSearch();return;}
  if(e.key==='ArrowDown'){
    e.preventDefault();
    searchFocusIdx=Math.min(searchFocusIdx+1,items.length-1);
    items.forEach((el,i)=>el.classList.toggle('focused',i===searchFocusIdx));
    if(items[searchFocusIdx])items[searchFocusIdx].scrollIntoView({block:'nearest'});
    return;
  }
  if(e.key==='ArrowUp'){
    e.preventDefault();
    searchFocusIdx=Math.max(searchFocusIdx-1,0);
    items.forEach((el,i)=>el.classList.toggle('focused',i===searchFocusIdx));
    if(items[searchFocusIdx])items[searchFocusIdx].scrollIntoView({block:'nearest'});
    return;
  }
  if(e.key==='Enter'){
    if(searchFocusIdx>=0&&items[searchFocusIdx]){items[searchFocusIdx].click();return;}
    const f=document.querySelector('#sd-results .sd-item');if(f)f.click();
  }
}
function renderSearchDropdown(query){
  const header=document.getElementById('sd-header-text');
  const results=document.getElementById('sd-results');
  const noRes=document.getElementById('search-no-results');
  if(!query){
    header.textContent='Recent Searches';
    if(!searchHistory.length){results.innerHTML='';noRes.style.display='block';noRes.textContent='No recent searches';return;}
    noRes.style.display='none';
    results.innerHTML=searchHistory.slice(0,30).map((s,i)=>`
      <div class="sd-item" onclick="playFromSearch(${i})">
        <svg style="width:13px;height:13px;flex-shrink:0;color:rgba(255,255,255,0.3)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <div class="sd-item-text"><div class="sd-title">${s.title}</div><div class="sd-sub">${s.artist} · ${s.playlist}</div></div>
        <svg class="sd-play-icon" width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </div>`).join('');
    return;
  }
  header.textContent='Results';
  const q=query.toLowerCase();
  let matches=[];
  PLAYLISTS.forEach((pl,pi)=>{
    pl.tracks.forEach((t,ti)=>{
      const score=(t.title.toLowerCase().includes(q)?2:0)+(pl.artist.toLowerCase().includes(q)?1:0)+(pl.name.toLowerCase().includes(q)?1:0);
      if(score>0)matches.push({title:t.title,artist:pl.artist,playlist:pl.name,trackIdx:ti,plistIdx:pi,score});
    });
  });
  matches.sort((a,b)=>b.score-a.score);
  if(!matches.length){results.innerHTML='';noRes.style.display='block';noRes.textContent='No results for "'+query+'"';return;}
  noRes.style.display='none';
  results.innerHTML=matches.map(m=>`
    <div class="sd-item" onclick="playFromSearchResult(${m.plistIdx},${m.trackIdx},${JSON.stringify(m.title)},${JSON.stringify(m.artist)},${JSON.stringify(m.playlist)})">
      <div class="sd-dot"></div>
      <div class="sd-item-text"><div class="sd-title">${m.title}</div><div class="sd-sub">${m.artist}</div></div>
      <span class="sd-album-badge">${m.playlist}</span>
      <svg class="sd-play-icon" width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    </div>`).join('');
}
function playFromSearch(i){
  const s=searchHistory[i];if(!s)return;
  if(currentPlaylist!==s.plistIdx){currentPlaylist=s.plistIdx;buildList();updatePanelHead();updateTabs();updateLogo();}
  play(s.trackIdx);closeSearch();
}
function playFromSearchResult(plistIdx,trackIdx,title,artist,playlist){
  const entry={title,artist,playlist,trackIdx,plistIdx};
  const dup=searchHistory.findIndex(s=>s.title===title&&s.plistIdx===plistIdx);
  if(dup>-1)searchHistory.splice(dup,1);
  searchHistory.unshift(entry);
  if(searchHistory.length>30)searchHistory=searchHistory.slice(0,30);
  if(currentPlaylist!==plistIdx){currentPlaylist=plistIdx;buildList();updatePanelHead();updateTabs();updateLogo();}
  play(trackIdx);closeSearch();
}

// ── PLAYLIST SWITCHING + PIN SYSTEM ──────────────────────────────────
let pinnedPlaylists = new Set();

function switchPlaylist(idx){
  if(currentPlaylist===idx)return;
  currentPlaylist=idx;
  current=0;
  buildList();
  updatePanelHead();
  updateTabs();
  updateLogo();
  updatePinBtn();
  stopWordCycle();
}
function updatePanelHead(){
  const pl=PLAYLISTS[currentPlaylist];
  document.getElementById('panel-album-title').textContent=pl.name;
  document.getElementById('panel-album-sub').textContent=pl.artist+' · '+pl.year;
  document.getElementById('track-artist-big').textContent=pl.artist;
}
function updateLogo(){
  const pl=PLAYLISTS[currentPlaylist];
  const logo=document.getElementById('artist-logo');
  if(pl.logoType==='top'){
    logo.src='data:image/png;base64,'+TOP_B64;
    logo.style.filter='';
  } else if(pl.logoType==='em'){
    logo.src='data:image/svg+xml;base64,'+EM_SVG;
    logo.style.filter='drop-shadow(0 0 10px rgba(200,30,10,0.9)) drop-shadow(0 0 24px rgba(180,20,0,0.6))';
  } else {
    logo.src='data:image/svg+xml;base64,'+ID_SVG;
    logo.style.filter='drop-shadow(0 0 10px rgba(30,80,200,0.9)) drop-shadow(0 0 24px rgba(20,60,180,0.6))';
  }
}
function updatePinBtn(){
  const btn=document.getElementById('pin-artist-btn');
  if(!btn)return;
  const isPinned=pinnedPlaylists.has(currentPlaylist);
  btn.classList.toggle('pinned',isPinned);
  btn.title=isPinned?'Unpin artist tab':'Pin artist as tab';
}
function togglePinCurrentArtist(){
  if(pinnedPlaylists.has(currentPlaylist)){
    pinnedPlaylists.delete(currentPlaylist);
  } else {
    pinnedPlaylists.add(currentPlaylist);
  }
  updatePinBtn();
  buildTabs();
}
function unpinPlaylist(idx, evt){
  evt.stopPropagation();
  pinnedPlaylists.delete(idx);
  buildTabs();
  updatePinBtn();
}
function updateTabs(){
  document.querySelectorAll('.ptab').forEach(el=>{
    el.classList.toggle('active',parseInt(el.dataset.idx)===currentPlaylist);
  });
}
function buildTabs(){
  const tabs=document.getElementById('playlist-tabs');
  const pinned=[...pinnedPlaylists];
  if(pinned.length===0){tabs.classList.add('hidden');tabs.innerHTML='';return;}
  tabs.classList.remove('hidden');
  tabs.innerHTML=pinned.map(i=>{
    const pl=PLAYLISTS[i];
    let imgSrc='';
    if(pl.logoType==='top') imgSrc='data:image/png;base64,'+TOP_B64;
    else if(pl.logoType==='em') imgSrc='data:image/svg+xml;base64,'+EM_SVG;
    else imgSrc='data:image/svg+xml;base64,'+ID_SVG;
    const isActive=i===currentPlaylist;
    return '<div class="ptab'+(isActive?' active':'')+'" data-idx="'+i+'" onclick="switchPlaylist('+i+')">'
      +'<img class="ptab-img" src="'+imgSrc+'" alt="">'
      +'<span class="ptab-label">'+pl.short+'</span>'
      +'<button class="ptab-unpin" onclick="unpinPlaylist('+i+',event)" title="Unpin">×</button>'
      +'</div>';
  }).join('');
}
function buildList(){
  const pl=PLAYLISTS[currentPlaylist];
  const list=document.getElementById('track-list');
  list.innerHTML=pl.tracks.map((t,i)=>{
    const key=currentPlaylist+':'+i;
    const liked=likedTracks.has(key);
    return '<div class="track" id="tr'+i+'" onclick="play('+i+')">'
      +'<div class="t-num-wrap">'
      +'<span class="t-num-txt">'+t.n+'</span>'
      +'<div class="mini-bars"><div class="m-bar"></div><div class="m-bar"></div><div class="m-bar"></div></div>'
      +'</div>'
      +'<div class="t-info"><div class="t-name">'+t.title+'</div><div class="t-dur">'+t.dur+'</div></div>'
      +'<button class="t-like'+(liked?' liked':'')+'" onclick="toggleLike('+i+',event)" title="Like">'
      +'<svg width="12" height="12" viewBox="0 0 24 24" fill="'+(liked?'currentColor':'none')+'" stroke="currentColor" stroke-width="2.2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>'
      +'</button>'
      +'<div class="t-right"><div class="t-dot"></div></div>'
      +'</div>';
  }).join('');
}
function toggleLike(i, evt){
  evt.stopPropagation();
  const key=currentPlaylist+':'+i;
  if(likedTracks.has(key)){
    likedTracks.delete(key);
    trackPlayCounts[key]=(trackPlayCounts[key]||1)-1;
    if(trackPlayCounts[key]<0)trackPlayCounts[key]=0;
  } else {
    likedTracks.add(key);
    trackPlayCounts[key]=(trackPlayCounts[key]||0)+3; // likes boost score by 3
  }
  buildList();
  // re-highlight active
  const el=document.getElementById('tr'+current);
  if(el)el.classList.add('active');
}

// ── WORD CYCLE ────────────────────────────────────────────────────────
function startWordCycle(trackTitle){
  stopWordCycle();
  const words=[trackTitle.toUpperCase(),...PLAYLISTS[currentPlaylist].wordBank];
  let idx=0;
  setWord(words[0]);
  wordTimer=setInterval(()=>{
    idx=(idx+1)%words.length;
    const el=document.getElementById('word-el');
    if(el){el.classList.add('word-exit');setTimeout(()=>setWord(words[idx]),300);}
  },3000);
}
function stopWordCycle(){
  clearInterval(wordTimer);
  setWord(PLAYLISTS[currentPlaylist].name.toUpperCase());
}
function setWord(text){
  const el=document.getElementById('word-el');
  if(!el)return;
  el.classList.remove('word-exit');
  el.textContent=text;
  el.setAttribute('data-text',text);
}

// ── VIZ ───────────────────────────────────────────────────────────────
let vizInt=null;
function animateViz(on){
  const bars=document.querySelectorAll('.mv-bar');
  const viz=document.getElementById('mini-viz');
  if(on){viz.classList.add('active');if(!vizInt)vizInt=setInterval(()=>{bars.forEach(b=>{b.style.height=(4+Math.random()*14)+'px'})},120);}
  else{viz.classList.remove('active');clearInterval(vizInt);vizInt=null;bars.forEach(b=>b.style.height='4px');}
}

// ── PROGRESS ──────────────────────────────────────────────────────────
document.getElementById('prog-bar').addEventListener('click',e=>{
  if(!player||typeof player.getDuration!=='function')return;
  const r=e.currentTarget.getBoundingClientRect();
  player.seekTo(((e.clientX-r.left)/r.width)*player.getDuration(),true);
});
document.getElementById('bg-file').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const url=URL.createObjectURL(f);
  document.getElementById('bg').style.backgroundImage='url('+url+')';
  document.getElementById('bg-blur').style.backgroundImage='url('+url+')';
});

// ── UTILS ─────────────────────────────────────────────────────────────
function fmtTime(s){if(!s||isNaN(s))return'0:00';return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0')}
function setPlayState(playing){
  isPlaying=playing;
  document.getElementById('play-icon').style.display=playing?'none':'block';
  document.getElementById('pause-icon').style.display=playing?'block':'none';
  const v=document.getElementById('art-vinyl-sm');
  playing?v.classList.add('spinning'):v.classList.remove('spinning');
  animateViz(playing);
  if(playing)startWordCycle(TRACKS()[current].title);
  else stopWordCycle();
}
function onState(e){
  const S=YT.PlayerState;
  if(e.data===S.PLAYING){
    setPlayState(true);clearInterval(progTimer);
    progTimer=setInterval(()=>{
      if(!player||typeof player.getCurrentTime!=='function')return;
      const c=player.getCurrentTime(),d=player.getDuration();
      if(d>0)document.getElementById('prog-fill').style.width=(c/d*100)+'%';
      document.getElementById('t-cur').textContent=fmtTime(c);
      document.getElementById('t-dur').textContent=fmtTime(d);
    },400);
  } else if(e.data===S.PAUSED){setPlayState(false);clearInterval(progTimer);}
  else if(e.data===S.ENDED){setPlayState(false);clearInterval(progTimer);nextTrack();}
  else if(e.data!==S.BUFFERING){setPlayState(false);clearInterval(progTimer);}
}
function onErr(){setTimeout(()=>nextTrack(),1000);}

// ── PLAY ──────────────────────────────────────────────────────────────
function play(i){
  if(!ytReady||!player||typeof player.loadVideoById!=='function')return;
  current=i;
  if(shuffling){const qi=shuffleQueue.indexOf(i);if(qi>-1)shufflePos=qi;}
  const pl=PLAYLISTS[currentPlaylist];
  const t=pl.tracks[i];
  // Track play count for smart shuffle
  const key=currentPlaylist+':'+i;
  trackPlayCounts[key]=(trackPlayCounts[key]||0)+1;
  player.loadVideoById(t.id);
  document.getElementById('track-name-big').textContent=t.title;
  document.getElementById('track-artist-big').textContent=pl.artist;
  document.getElementById('t-dur').textContent=t.dur;
  document.getElementById('t-cur').textContent='0:00';
  document.getElementById('prog-fill').style.width='0%';
  document.getElementById('panel-np-title').textContent=t.title;
  document.getElementById('panel-np-sub').textContent='Track '+t.n+' · '+pl.name;
  document.querySelectorAll('.track').forEach((el,j)=>el.classList.toggle('active',j===i));
  const el=document.getElementById('tr'+i);
  if(el)el.scrollIntoView({block:'nearest',behavior:'smooth'});
  addToHistory(t,pl,currentPlaylist,i);
  // Media Session API — controls Beats headphone buttons, lock screen, etc.
  if('mediaSession' in navigator){
    navigator.mediaSession.metadata=new MediaMetadata({
      title:t.title,
      artist:pl.artist,
      album:pl.name,
    });
    navigator.mediaSession.setActionHandler('play',()=>togglePause());
    navigator.mediaSession.setActionHandler('pause',()=>togglePause());
    navigator.mediaSession.setActionHandler('nexttrack',()=>nextTrack());
    navigator.mediaSession.setActionHandler('previoustrack',()=>prevTrack());
    navigator.mediaSession.setActionHandler('seekbackward',()=>{
      if(player&&typeof player.getCurrentTime==='function')
        player.seekTo(Math.max(0,player.getCurrentTime()-10),true);
    });
    navigator.mediaSession.setActionHandler('seekforward',()=>{
      if(player&&typeof player.getCurrentTime==='function')
        player.seekTo(player.getCurrentTime()+10,true);
    });
  }
}
function nextTrack(){
  const tracks=TRACKS();
  if(looping){player.seekTo(0,true);player.playVideo();return;}
  if(shuffling){
    shufflePos=(shufflePos+1)%shuffleQueue.length;
    // In smart mode, rebuild queue periodically to reflect new play data
    if(shuffleMode===2&&shufflePos===0)buildSmartQueue(tracks);
    play(shuffleQueue[shufflePos]);
  } else play((current+1)%tracks.length);
}
function prevTrack(){
  const tracks=TRACKS();
  if(shuffling){shufflePos=(shufflePos-1+shuffleQueue.length)%shuffleQueue.length;play(shuffleQueue[shufflePos]);}
  else play((current-1+tracks.length)%tracks.length);
}
function togglePause(){
  if(!player||typeof player.getPlayerState!=='function')return;
  player.getPlayerState()===YT.PlayerState.PLAYING?player.pauseVideo():player.playVideo();
}
function toggleLoop(){
  looping=!looping;
  const b=document.getElementById('loop-btn');
  b.classList.toggle('on',looping);
  b.style.color=looping?'#bf5af2':'';
}
// shuffleMode: 0=off, 1=normal, 2=smart
let shuffleMode=0;
let likedTracks=new Set();
let trackPlayCounts={};

function cycleShuffleMode(){
  const tracks=TRACKS();
  shuffleMode=(shuffleMode+1)%3;
  const b=document.getElementById('shuffle-btn');
  b.classList.remove('on');
  b.style.color='';
  b.querySelector('.smart-badge').style.display='none';
  b.title='Shuffle (click: off → normal → smart)';
  if(shuffleMode===1){
    // Normal shuffle
    shuffling=true;
    b.classList.add('on');
    b.style.color='#bf5af2';
    b.title='Normal shuffle (click for Smart)';
    buildNormalQueue(tracks);
  } else if(shuffleMode===2){
    // Smart shuffle — weights by play count & likes
    shuffling=true;
    b.classList.add('on');
    b.style.color='#bf5af2';
    b.querySelector('.smart-badge').style.display='block';
    b.title='Smart shuffle — weighted by likes & plays (click to turn off)';
    buildSmartQueue(tracks);
  } else {
    shuffling=false;
  }
}
function buildNormalQueue(tracks){
  shuffleQueue=tracks.map((_,i)=>i);
  for(let i=shuffleQueue.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[shuffleQueue[i],shuffleQueue[j]]=[shuffleQueue[j],shuffleQueue[i]];}
  const ci=shuffleQueue.indexOf(current);
  if(ci>-1){shuffleQueue.splice(ci,1);shuffleQueue.unshift(current);}
  shufflePos=0;
}
function buildSmartQueue(tracks){
  // Build weighted pool: each track gets weight = 1 + playCount + 3*liked
  const weighted=[];
  tracks.forEach((_,i)=>{
    const key=currentPlaylist+':'+i;
    const w=1+(trackPlayCounts[key]||0)+(likedTracks.has(key)?3:0);
    for(let j=0;j<w;j++)weighted.push(i);
  });
  // Shuffle weighted pool
  for(let i=weighted.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[weighted[i],weighted[j]]=[weighted[j],weighted[i]];}
  // Deduplicate while preserving order, current first
  const seen=new Set();
  shuffleQueue=[current];
  seen.add(current);
  weighted.forEach(idx=>{if(!seen.has(idx)){seen.add(idx);shuffleQueue.push(idx);}});
  // Fill in any missing
  tracks.forEach((_,i)=>{if(!seen.has(i))shuffleQueue.push(i);});
  shufflePos=0;
}

// INIT
buildTabs(); // starts hidden (no pinned artists yet)
buildList();
renderHistory();
// Keyboard shortcut: space = play/pause, arrow keys = skip
document.addEventListener('keydown',e=>{
  const tag=document.activeElement.tagName;
  if(tag==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();togglePause();}
  else if(e.code==='ArrowRight'&&e.altKey){e.preventDefault();nextTrack();}
  else if(e.code==='ArrowLeft'&&e.altKey){e.preventDefault();prevTrack();}
});
</script>
